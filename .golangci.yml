version: "2"
linters:
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      # Pre-existing issues — tracked separately for future cleanup
      - linters: [errcheck]
        path: _test\.go
      - linters: [staticcheck]
        text: "SA1019:"
      - linters: [staticcheck]
        text: "S1019:"
      - linters: [staticcheck]
        text: "QF1003:"
      - linters: [staticcheck]
        text: "QF1006:"
      - linters: [staticcheck]
        text: "ST1019:"
      - linters: [staticcheck]
        text: "S1021:"
      - linters: [staticcheck]
        text: "ST1005:"
      - linters: [staticcheck]
        text: "S1008:"
      - linters: [ineffassign]
        path: \.go$
      - linters: [unused]
        path: \.go$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
